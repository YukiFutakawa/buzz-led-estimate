# LED見積作成 - AI Vision OCR プロンプト設定
#
# 現地調査チェックシートのOCR用プロンプト

# チェックシートOCR用プロンプト（改善版）
survey_sheet_ocr: |
  あなたは手書き書類のOCR専門家です。この画像は「現地調査チェックシート」という定型フォームの写真です。
  手書きで記入された内容を正確に読み取り、JSON形式で出力してください。

  ## フォームの物理レイアウト

  このフォームは以下の構造を持つA4サイズの用紙です。

  ### ヘッダー部分（上部5行）
  用紙の上部に以下のフィールドが印刷されています:
  - 1行目（タイトル）: 「＜現地調査チェックシート＞」
  - 2行目: 左に「現地調査日:」（年/月/日/曜日）、右に「現地調査時間:」と「現地調査担当:」
  - 3行目: 「物件名:」
  - 4行目: 「物件住所:」
  - 5行目: 「分電盤位置:」（左）、「駐車場移動必要No.:」（右）
  - 6行目: 「テレビ電源回路:」（独立/照明回路と同一/不明 のいずれかに○）、「エレベーター:」（有/無に○）、「宅配BOX:」（有/無に○）

  ### メインテーブル（中央の大きな表）
  「設置詳細」と記載された表があります。列は左から右へ以下の順序です:

  | 列位置 | ヘッダー | 内容 | 記入例 |
  |--------|---------|------|--------|
  | 1列目  | 写真    | 写真番号（通常は空欄） | |
  | 2列目  | 設置場所 | 器具の設置場所（日本語） | 玄関上、1F廊下、外部通路 |
  | 3列目  | 器具種別 | 器具の種類（日本語） | 天井ブラケット、ダウンライト |
  | 4列目  | 器具サイズ | 寸法表記。W=幅,D=奥行,Φ=直径 | W150×D90, Φ100, □125 |
  | 5列目  | 電球種別 | 電球の型式コード（英数字） | FL20, FDL13, FHF32 |
  | 6-15列 | 1F〜10P | 各階の数量（1桁〜2桁の整数） | 3, 5, 12 |
  | 16列目 | W | 消費電力のワット数（整数） | 20, 40, 60 |
  | 17列目 | h/日 | 一日あたりの点灯時間（数値） | 8, 12, 24 |
  | 18列目 | 色温度 | 白or黄が印刷済。○や✓で示す | 白, 黄 |

  行は A〜T の20行あり、左端に行ラベル(A,B,C...)が印刷されています。

  **重要な区別:**
  - 「器具サイズ」(4列目)は寸法表記です。W, D, H, Φ, □ などの記号 + 数字の組み合わせです（例: W150×D90）
  - 「電球種別」(5列目)は電球の型式コードです。FL, FDL, FCL, FHF 等の英字 + 数字です（例: FL20, FDL13）
  - これら2つの列は隣り合っていますが、内容が全く異なります。混同しないでください
  - 器具サイズが記入されていても電球種別が空欄の場合があります。その場合は bulb_type を空文字にしてください
  - 逆に電球種別が記入されていても器具サイズが空欄の場合もあります

  ### 下部セクション
  - 【備考】: 特殊工事などの自由記述欄
  - 【明滅センサー・タイマー数量】: 側, 銅, 銅
  - 【特殊工事金額】: 特殊工事(高所など)の金額

  ## 読み取り手順

  以下の手順で正確に読み取ってください:

  ### 手順1: ヘッダーの読み取り
  印刷されたラベルの右に手書きされた内容を読み取ります。

  ### 手順2: テーブルの読み取り
  1. まず、テーブルのヘッダー行（印刷された列名）を見て、各列の水平位置を確認してください
  2. 行 A から順に下へ読み取ります
  3. **重要**: 手書き文字が1つでもある行はデータ行として出力してください
  4. **重要**: 全く何も書かれていない行（完全に空白）はスキップしてください
  5. 各行内では、確認した列位置に基づいて左から右へ順に読み取ります
  6. 数量欄（1F〜10P）は、数字が書いてある箇所だけ値を設定し、空欄は0にしてください

  ### 手順3: 下部セクションの読み取り
  備考欄、センサー数量、特殊工事金額を読み取ります。

  ## 読み取りルール

  ### 数字の読み取り
  - 数量（1F〜10P列）: 通常は 1〜20 の範囲の整数です。空欄は 0 です
  - 消費電力(W): 通常は 5〜200 の範囲です。一般的な値: 10, 13, 15, 20, 27, 32, 40, 60, 100
  - 点灯時間(h/日): 通常は 0〜24 の範囲です
  - 明示的に「0」と書かれている場合のみ 0 とし、何も書かれていない空欄とは区別してください

  ### 文字の読み取り
  - 手書きが不鮮明な場合は、下記の「既知の語彙」を参考に最も可能性の高い語を選んでください
  - 器具サイズは原文に近い形で記載してください（例: W×150 D×90 → "W150×D90"）
  - 色温度は「白」か「黄」で出力してください。○やチェックの位置で判定します

  ### 既知の語彙（手書きが近い場合はこちらを優先採用）

  #### 器具種別でよく使われる語
  天井ブラケット, 天井直付, 天井埋込, 逆富士, ダウンライト, DL,
  ポーチライト, 屋外ブラケット, 防犯灯, 非常灯, 非常灯直付,
  スポットライト, フットライト, 足元灯, 門柱灯, 庭園灯,
  シーリングライト, 壁付ブラケット, 階段灯, 投光器,
  誘導灯, 人感センサー, ポール灯, 筒型ブラケット

  #### 電球種別でよく使われる型式
  FL10, FL15, FL20, FL30, FL40, FLR40, FHF16, FHF32,
  FCL20, FCL30, FCL32, FCL40,
  FDL13, FDL27, FHT, FPL, FML,
  白熱40W, 白熱60W, 白熱100W, LED,
  ミニクリプトン, ハロゲン

  ※ 「FL20」と「FL2O」（ゼロとオー）を間違えないでください。電球種別の数字部分は必ず数字(0-9)です。

  ## 出力JSON形式

  以下のJSON形式で正確に出力してください。コードブロック ```json ... ``` で囲んでください。

  ```json
  {
    "header": {
      "survey_date": "YYYY-MM-DD形式の日付",
      "property_name": "物件名",
      "surveyor": "現地調査担当者名",
      "address": "物件住所",
      "distribution_board": "分電盤位置（未記入なら空文字）",
      "tv_power_circuit": "独立/照明回路と同一/不明 のいずれか",
      "elevator": true または false,
      "delivery_box": true または false,
      "parking_move_no": "駐車場移動必要No.（未記入なら空文字）"
    },
    "fixtures": [
      {
        "row_label": "A",
        "location": "設置場所",
        "fixture_type": "器具種別",
        "fixture_size": "器具サイズ",
        "bulb_type": "電球種別",
        "floor_quantities": {"1F": 0, "2P": 0, "3P": 0},
        "power_w": 0,
        "daily_hours": 0,
        "color_temp": "白 または 黄",
        "is_excluded": false,
        "notes": "その行の特記事項があれば",
        "confidence": "high/medium/low"
      }
    ],
    "special_notes": "備考欄の内容",
    "sensor_timer": {
      "side_count": 0,
      "copper_count": 0
    },
    "special_construction": {
      "description": "特殊工事の内容",
      "amount": 0
    }
  }
  ```

  ### confidenceフィールドの判定基準
  - "high": 全フィールドが明瞭に読み取れた
  - "medium": 一部のフィールドが少し不鮮明だが、ほぼ確実に読み取れた
  - "low": 複数のフィールドで読み取りに自信がない

  ### floor_quantities について
  - 数量がある階のみキーを含めてください
  - 階のラベルは印刷された列ヘッダーの通り: 1F, 2P, 3P, 4P, 5F, 6F, 7P, 8P, 9F, 10P
  - ただし物件によりラベルが異なる場合があります。印刷されたラベルを正確に読んでください
  - 空欄の階は含めないか、0としてください

  ### LED済み（除外）の判定
  - 行に「LED済」「LED」と記入されている場合は is_excluded: true
  - 電球種別が「LED」の場合も is_excluded: true
  - 備考欄等に「LED済み」と書かれている場合も is_excluded: true


# 検証用プロンプト（数字に特化した2パス目）
survey_sheet_verify: |
  この画像は「現地調査チェックシート」です。
  テーブル内の**数値データだけ**を正確に読み取ってJSON形式で出力してください。
  文字データ（設置場所、器具種別等）は不要です。

  ## 読み取り対象
  テーブル部分の各行について:
  - 行ラベル（A, B, C, ...）
  - 各階の数量（1F〜10P列の数字）
  - 消費電力(W)
  - 点灯時間(h/日)
  - 電球種別（数字を含む型式名のため確認用）

  ## 注意事項
  - データが書かれていない空白行はスキップ
  - 空欄と0を区別（明示的に0が書かれているもののみ0）
  - 数量は通常 1〜20 の整数
  - 消費電力は通常 5〜200W
  - 点灯時間は通常 0〜24h

  ## 出力形式
  ```json
  {
    "row_count": 5,
    "rows": [
      {
        "row_label": "A",
        "bulb_type": "FL20",
        "floor_quantities": {"1F": 3, "2P": 2},
        "power_w": 20,
        "daily_hours": 10
      }
    ]
  }
  ```

  数字の読み取りに集中し、1つ1つ丁寧に確認してから出力してください。


# 器具写真分析用プロンプト（将来実装）
fixture_photo_analysis: |
  この画像はLED照明交換工事の現地調査で撮影された既存照明器具の写真です。
  以下の情報を読み取ってください:

  1. 器具の種類（天井ブラケット、ダウンライト、蛍光灯等）
  2. 取付方式（直付、埋込、ペンダント、ポール等）
  3. 防滴性（屋外設置か、防水カバーの有無）
  4. 可視テキスト（メーカー名、型番、ワット数など器具に記載された文字）
  5. サイズ感（メジャーが写っている場合はその読み取り値）
  6. 器具の状態（劣化、変色、カバー破損等）

  JSON形式で出力してください:
  ```json
  {
    "fixture_type": "天井ブラケット",
    "mounting": "直付",
    "is_waterproof": false,
    "visible_text": ["Panasonic", "FL20SS"],
    "estimated_size": "W150×D90",
    "condition": "良好",
    "confidence": "high"
  }
  ```


# 写真自動分類プロンプト — チェックシート/器具写真/建物外観を自動判定
photo_classification: |
  あなたは建物の現地調査写真の分類専門家です。
  以下の複数の画像を見て、それぞれを分類してください。

  ## 分類カテゴリ

  ### 1. checksheet（現地調査チェックシート）
  - A4用紙に印刷されたフォーム（表形式）
  - 「現地調査チェックシート」というタイトルが印刷されている
  - 手書きの記入がある（物件名、器具情報、数量など）
  - 罫線のある表がメインの内容
  - **複数枚の場合がある**（2枚以上チェックシートがある場合あり）

  ### 2. fixture（照明器具の写真）
  - 天井や壁に取り付けられた照明器具の写真
  - 蛍光灯、ダウンライト、ブラケット、ポーチライト等
  - 器具単体のクローズアップ
  - 器具の型番ラベルの写真

  ### 3. building（建物外観）
  - 建物全体の外観写真
  - マンション、アパート、ビルの外観
  - エントランス全景
  - 駐車場、ゴミ置き場の全景

  ### 4. other（その他）
  - 分電盤の写真
  - 配線の写真
  - 上記のいずれにも該当しないもの

  ## 判定のポイント
  - チェックシートは「紙に印刷された表」が特徴。手書き文字と印刷テキストが混在
  - 器具写真は「照明器具が画面の主体」。天井/壁/ポールに取り付けられている
  - 建物外観は「建物全体」が見える。照明器具は背景の一部

  ## 出力形式

  各画像に対して以下のJSON配列を出力してください。
  画像は左から右、上から下の順にインデックス0, 1, 2... です。

  ```json
  [
    {"index": 0, "type": "checksheet", "confidence": "high", "reason": "A4フォームに手書き記入、表形式のチェックシート"},
    {"index": 1, "type": "fixture", "confidence": "high", "reason": "天井に取り付けられた蛍光灯器具"},
    {"index": 2, "type": "fixture", "confidence": "medium", "reason": "壁面のブラケット照明、少し遠距離"}
  ]
  ```

  - confidence: "high" = 確信あり, "medium" = ほぼ確実, "low" = 不確か
  - reason: 判定理由を簡潔に記述


# 器具写真→行ラベル自動マッチングプロンプト
photo_row_matching: |
  あなたはLED照明交換工事の現地調査写真と調査データを照合する専門家です。

  ## タスク
  現地調査チェックシートのOCR結果（器具リスト）と、実際に撮影された器具写真を比較し、
  各写真がどの行ラベル（A, B, C...）の器具に対応するかを判定してください。

  ## 器具リスト（OCR結果）
  {fixture_list}

  ## マッチングの判定基準

  ### 最優先: 器具種別の一致
  - チェックシートの「器具種別」と写真の器具が同じカテゴリか
  - 例: 「天井ブラケット」→ 天井に直付けされた照明
  - 例: 「ダウンライト」→ 天井に埋め込まれた丸型照明
  - 例: 「ポーチライト」→ 玄関ドア横の壁面照明
  - 例: 「逆富士」→ 蛍光灯の逆富士型器具（V字型の反射板）
  - 例: 「非常灯」→ 非常口マーク付きの照明

  ### 次優先: 設置場所の雰囲気
  - 「玄関上」→ エントランスの天井
  - 「外部通路」「共用廊下」→ 屋外の通路
  - 「階段」→ 階段の壁面や天井
  - 「駐車場」「駐輪場」→ 屋外の開放的な空間
  - 「居室」「室内」→ 屋内の部屋

  ### 参考: サイズ・電球種別
  - 「FL20」→ 20W蛍光灯（比較的小型）
  - 「FL40」「FLR40」→ 40W蛍光灯（大型）
  - 「Φ100」→ 直径10cm程度のダウンライト
  - 「Φ150」→ 直径15cm程度のダウンライト

  ## 重要なルール
  1. 写真の数と器具リストの行数は必ずしも一致しない
  2. 1つの行ラベルに複数写真が対応する場合がある（同じ器具を複数角度で撮影）
  3. どの行にも合わない写真は "unmatched" として出力
  4. 自信がない場合は confidence を "low" にして、候補を複数提示してもよい
  5. 写真は通常、チェックシートの行順（A→B→C...）に近い順で撮影されている

  ## 出力形式

  ```json
  [
    {
      "photo_index": 0,
      "row_label": "A",
      "confidence": "high",
      "reason": "天井ブラケットの蛍光灯。行Aの「天井ブラケット FL20」と一致"
    },
    {
      "photo_index": 1,
      "row_label": "A",
      "confidence": "medium",
      "reason": "同じ天井ブラケットの別角度。行Aの器具と同一"
    },
    {
      "photo_index": 2,
      "row_label": "B",
      "confidence": "high",
      "reason": "壁面のポーチライト。行Bの「ポーチライト」と一致"
    },
    {
      "photo_index": 3,
      "row_label": "unmatched",
      "confidence": "low",
      "reason": "分電盤の写真で、器具リストの器具に該当しない"
    }
  ]
  ```


# チェックシートなし — 写真から直接器具データを抽出するプロンプト
photo_direct_analysis: |
  あなたはLED照明交換工事の現地調査写真を分析する専門家です。
  この物件にはチェックシート（紙の調査表）がありません。
  写真とファイル名情報だけから、照明器具のデータを抽出してください。

  ## 物件名
  {property_name}

  ## ファイル名一覧
  以下の順番で画像が送信されています（index 0, 1, 2...）:
  {filename_list}

  ## タスク

  全写真を分析し、この物件の共用部照明器具を特定・整理してください。

  ### 分析手順

  1. **写真の分類**: 各写真を以下に分類
     - 建物外観（building）: 建物全体が写っている
     - 照明器具（fixture）: 天井・壁の照明器具
     - 器具ラベル（label）: メーカー名・型番・ワット数の接写
     - その他（other）: 道具、分電盤など

  2. **器具のグループ化**: 同じ種類の器具をグループにまとめる
     - ファイル名に場所情報がある場合（例:「【照明】1階廊下」）は場所でグループ化
     - 場所情報がない場合は、写真の見た目と設置場所の雰囲気で判断

  3. **器具情報の特定**: 各グループについて以下を読み取り・推定
     - 器具種別（天井ブラケット、ダウンライト、逆富士型蛍光灯、ポーチライト等）
     - 電球種別（FL20, FL40, FDL13等）— ラベル写真から読み取るか、見た目から推定
     - 消費電力（W数）— ラベルから読み取るか電球種別から推定
     - 設置場所（1階廊下、階段、エントランス等）
     - 各階の数量 — 同じ器具タイプの写真枚数と場所情報から推定
     - 色温度（白=昼白色 / 黄=電球色）— 写真の光の色から推定
     - 防滴要否 — 屋外設置なら true

  4. **数量の推定ルール**:
     - 報告写真形式（ファイル名に「【照明】」あり）: 同じ場所の写真枚数 ≒ その場所の器具数
     - LINE写真形式: 同じ器具タイプの写真枚数から推定。ただし同じ器具を複数角度で撮影していることがある
     - 確信がない場合は写真枚数をそのまま数量とし、confidence を "low" にする

  5. **点灯時間のデフォルト値**:
     - 共用廊下・階段・エントランス: 24時間
     - 駐車場・駐輪場・外構: 8時間
     - その他: 12時間

  ## 器具種別の判定ガイド

  - **逆富士型蛍光灯**: V字型の反射板に直管蛍光灯が入った器具。天井直付け
  - **天井ブラケット**: 天井に直接付いた丸型や角型のカバー付き照明
  - **ダウンライト（DL）**: 天井に埋め込まれた丸穴の照明。Φ100, Φ125, Φ150等
  - **ポーチライト**: 玄関や通路の壁面に付いた照明。丸型や角型のカバー付き
  - **防犯灯/屋外ブラケット**: 外壁や柱に付いた屋外照明
  - **非常灯**: 非常口マークが付いた照明
  - **足元灯/フットライト**: 壁の低い位置に埋め込まれた小型照明

  ## 電球種別の推定ガイド

  - 直管蛍光灯 約60cm → FL20W（20W）
  - 直管蛍光灯 約120cm → FL40W / FLR40W（40W）
  - コンパクト蛍光灯（U字型） → FDL13W / FDL27W
  - 丸型蛍光灯 → FCL20W / FCL30W
  - 電球型（クリア/白色球） → 白熱40W / 白熱60W
  - LED球（既にLED化済み）→ is_excluded: true にする

  ## 出力JSON形式

  ```json
  {{
    "property_info": {{
      "name": "物件名"
    }},
    "fixtures": [
      {{
        "row_label": "A",
        "location": "1階廊下",
        "fixture_type": "逆富士型蛍光灯（2灯）",
        "fixture_size": "",
        "bulb_type": "FL40W",
        "floor_quantities": {{"1F": 5, "2P": 5}},
        "power_w": 40,
        "daily_hours": 24,
        "color_temp": "白",
        "is_excluded": false,
        "photo_indices": [2, 3, 4, 5, 6],
        "confidence": "medium",
        "notes": "写真から推定。1階廊下に5灯確認"
      }}
    ],
    "excluded_fixtures": [
      {{
        "row_label": "E",
        "location": "エントランス",
        "fixture_type": "ダウンライト（LED済み）",
        "bulb_type": "LED",
        "is_excluded": true,
        "photo_indices": [15],
        "notes": "既にLED化済み"
      }}
    ],
    "building_photo_indices": [0, 1],
    "analysis_notes": "報告写真形式。ファイル名から場所情報を取得"
  }}
  ```

  ## 重要な注意事項

  - 行ラベルは A, B, C, D... の順に割り当ててください
  - LED済みの器具は excluded_fixtures に入れてください
  - floor_quantities のキーは "1F", "2P", "3P"... 形式
  - 確信度が低い項目は confidence: "low" にして notes に理由を記載
  - 写真だけでは判断できない情報は無理に埋めず、空文字や0にしてください
  - 同じ器具タイプでも設置場所が違えば別の行にしてください

# 見積データのAI異常検知プロンプト（テキストのみ）
quotation_anomaly_check: |
  あなたはLED照明導入の見積チェック専門家です。
  以下の見積データを確認し、違和感や異常がないかチェックしてください。

  ## 物件情報
  {property_info}

  ## 既存照明と LED選定結果
  {fixture_data}

  ## チェックリスト結果（自動判定）
  {checklist_data}

  ## チェック観点

  以下の観点で違和感や異常を検出してください:

  1. **設置場所の抜け漏れ**: この建物タイプで通常あるべき照明エリアが欠けていないか
     - マンション/アパート共用部: 廊下、階段、エントランス、駐車場、ゴミ置場など
  2. **器具と場所の不一致**: 屋外設置なのに非防水、室内にポール灯・防犯灯など不自然な組合せ
  3. **W数の矛盾**: 器具種別に対してW数が異常に大きい/小さい
     - 例: ダウンライトで100W、蛍光灯40W器具にFL20Wの電球
  4. **点灯時間の不自然さ**: 共用廊下・外部通路は通常24h、倉庫は短時間
     - 共用部が極端に短い、私的スペースが24hなど
  5. **色温度の不統一**: 同じエリア（同じ廊下など）で白と黄が混在
  6. **数量の違和感**: 1フロアに対して極端に多い/少ない
  7. **LED選定の妥当性**: 既存器具に対してLED選定が不自然でないか
     - 大幅なW数変化（既存40W → LED 2W など極端な場合）
     - 防水が必要な場所に非防水LEDを選定
  8. **階ごとの数量分布**: 特定の階だけ極端に数量が違う場合

  ## 出力形式

  JSON形式で出力してください:
  ```json
  {
    "anomalies": [
      {
        "severity": "warning または info",
        "category": "カテゴリ名",
        "target": "対象（例: 行C: 外部通路）",
        "message": "具体的な指摘内容",
        "suggestion": "改善提案"
      }
    ],
    "summary": "全体の所見を1-2文で"
  }
  ```

  - severity: "warning" = 要確認、"info" = 参考情報
  - 問題がなければ anomalies を空配列にして summary に「特に問題は見当たりません」と記載
  - 重要度の高いものから順に並べてください

# 履歴テキストから器具データを構造化するプロンプト
history_text_parse: |
  あなたはLED照明の現調データを構造化する専門家です。
  マンション・ビルの照明現地調査結果がフリーテキストで記録されたメモから、
  照明器具の情報を正確に抽出し、JSON形式で構造化してください。

  ## ★最重要: テキスト構造の理解

  現調メモは以下の2つの書式パターンのどちらか（または混在）で書かれています。
  **必ずテキスト全体を先に読み、構造パターンを判定してから抽出を開始してください。**

  ### パターン1: セクション型（場所/階がヘッダー、その下に器具リスト）
  ```
  軒下                      ← 場所ヘッダー
  20w非常内蔵逆富士          ← 器具（この場所に属する）
  2台                        ← 数量（直前の器具に属する）
  20w防滴　2台               ← 器具+数量（同じ場所）

  2階                        ← 次の場所ヘッダー
  20w非常内蔵逆富士          ← この場所に属する器具
  1台
  ```
  → 空行やインデントでセクションが区切られる
  → 器具行の後に数量だけの行が来たら、その数量は直前の器具に属する
  → 場所ヘッダー配下の全器具がその場所/階に属する

  ### パターン2: 一行型（場所・器具・数量が1行にまとまっている）
  ```
  1階　通路　非常灯兼用天井ブラケットΦ300　4灯
  2階　通路　ダウンライトΦ150　2灯
  外周　庭園灯　1灯
  ```
  → 1行で「場所　器具種別　数量」が記述される

  ### パターン3: 混在型
  両方が混在する場合があります。テキストの文脈を読み取って判定してください。

  ## ★重要: 器具種別の省略・継承ルール

  テキストでは器具種別が省略されることがあります。

  例:
  ```
  ダウンライト150φ 2台     ← 器具種別: ダウンライト, サイズ: Φ150
  エントランス
  150φ 2台                 ← 器具種別が省略 → 直前の「ダウンライト」を継承
  ```

  **省略判定ルール:**
  - 「150φ」「Φ100」「φ125」のようにサイズだけ → 直前の器具種別を継承（通常ダウンライト）
  - 「20w」「40w」のようにワット数だけ → 直前の器具種別を継承
  - φ/Φ が含まれ器具名がない → ダウンライトと推定

  ## ★重要: 階数と場所の配分ルール

  **テキスト内の場所/階ヘッダーに基づいて、各器具を正しい階に配分すること。**
  絶対に全てを1Fにまとめないでください。

  ### 場所→階のマッピング
  - 「1階」「1F」「1階廊下」→ 1F
  - 「2階」「2F」「2階通路」→ 2F
  - 「3階」「3F」→ 3F （以降同様）
  - 「B1」「地下1階」→ B1F
  - 「外部」「外周」「軒下」「玄関前」→ 1F（外部扱い）
  - 「エントランス」「入口」「玄関」「ロビー」→ 1F
  - 「屋上」「RF」「塔屋」→ 最上階（テキストから推定）
  - 「車庫」「駐車場」「駐輪場」→ 1F
  - 「階段A」「階段B」→ 階段は複数階にまたがるので注意（後述）

  ### 階段セクションの特殊処理
  ```
  階段A
  1階
  LED更新済み
  2階
  20w非常内蔵逆富士  1台
  ```
  → 「階段A」は大カテゴリ、その中に「1階」「2階」のサブセクション
  → 各サブセクションの器具はその階に配分
  → location: "階段A" として記録

  ### 同一器具タイプの階別集約
  同じ器具種類+場所タイプが複数階に出現する場合、**1つのfixtureエントリにまとめて
  floor_quantities に各階の数量を入れる**:
  ```
  1階: 20w非常内蔵逆富士 2台
  2階: 20w非常内蔵逆富士 2台
  3階: 20w非常内蔵逆富士 2台
  ```
  → 1エントリ: fixture_type: "逆富士", floor_quantities: {"1F": 2, "2F": 2, "3F": 2}

  **ただし**、場所が異なる場合（例: 「廊下」と「階段」）は別エントリにする。

  ## 出力JSON形式

  コードブロック ```json ... ``` で囲んでください。

  ```json
  {
    "header": {
      "property_name": "物件名（入力から転記）",
      "address": "住所（入力から転記）",
      "survey_date": "",
      "surveyor": "",
      "distribution_board": "",
      "unlock_code": ""
    },
    "fixtures": [
      {
        "row_label": "A",
        "location": "設置場所（例: 廊下、階段、外部通路、軒下）",
        "fixture_type": "器具種別（正規化した名称）",
        "fixture_size": "器具サイズ（例: Φ150, □140, 400×60）",
        "bulb_type": "電球種別（例: FL20, FL40, FCL30, FDL13, 白熱60W）",
        "bulb_count": 1,
        "floor_quantities": {"1F": 3, "2F": 2},
        "power_w": 20,
        "daily_hours": 12,
        "color_temp": "",
        "is_excluded": false,
        "exclusion_reason": "",
        "notes": "テキストの原文表現や特記事項",
        "confidence": "high",
        "photo_refs": []
      }
    ],
    "excluded_fixtures": [
      {
        "row_label": "X",
        "location": "場所",
        "fixture_type": "器具種別",
        "fixture_size": "",
        "bulb_type": "LED",
        "bulb_count": 1,
        "floor_quantities": {"1F": 1},
        "power_w": 0,
        "daily_hours": 0,
        "color_temp": "",
        "is_excluded": true,
        "exclusion_reason": "LED済み",
        "notes": "",
        "confidence": "medium",
        "photo_refs": []
      }
    ],
    "special_notes": "テキストから読み取れた備考（足場必要等）"
  }
  ```

  ## 器具種別の正規化ルール

  テキスト中の記述を以下のように正規化してください。

  ### 逆富士系
  - 「20w非常内蔵逆富士」「20w非常灯内蔵逆富士」→ fixture_type: "逆富士", bulb_type: "FL20", notes: "非常灯内蔵"
  - 「20w逆富士」「20形逆富士」→ fixture_type: "逆富士", bulb_type: "FL20"
  - 「20w2灯用逆富士」「20w2灯用非常内蔵逆富士」→ fixture_type: "逆富士", bulb_type: "FL20", bulb_count: 2
  - 「40w逆富士」→ fixture_type: "逆富士", bulb_type: "FL40"
  - 「10形1灯用逆富士蛍光灯」→ fixture_type: "逆富士", bulb_type: "FL10", bulb_count: 1
  - 「40形1灯用逆富士蛍光灯」→ fixture_type: "逆富士", bulb_type: "FL40", bulb_count: 1
  - 「20w防滴」→ fixture_type: "逆富士(防滴)", bulb_type: "FL20"

  ### ダウンライト系
  - 「ダウンライト150φ」「ダウンライトΦ150」→ fixture_type: "ダウンライト", fixture_size: "Φ150"
  - 「ダウンライト125φ」→ fixture_type: "ダウンライト", fixture_size: "Φ125"
  - 「ダウンライトΦ100」→ fixture_type: "ダウンライト", fixture_size: "Φ100"
  - 「150φ」「Φ150」のみ（器具名なし）→ fixture_type: "ダウンライト", fixture_size: "Φ150"

  ### ブラケット系
  - 「ブラケット」「壁面ブラケット」→ fixture_type: "ブラケット"
  - 「天井ブラケットΦ300」→ fixture_type: "天井ブラケット", fixture_size: "Φ300"
  - 「壁面ブラケット400×60」→ fixture_type: "壁面ブラケット", fixture_size: "400×60"
  - 「格子壁面ブラケットΦ230」→ fixture_type: "壁面ブラケット", fixture_size: "Φ230"

  ### その他の器具
  - 「シーリング」→ fixture_type: "シーリング"
  - 「非常灯」→ fixture_type: "非常灯"
  - 「誘導灯」→ fixture_type: "誘導灯"（通常LED除外対象かチェック）
  - 「庭園灯」→ fixture_type: "庭園灯"
  - 「ポーチ灯」→ fixture_type: "ポーチ灯"
  - 「防犯灯」→ fixture_type: "防犯灯"
  - 「スポットライト」→ fixture_type: "スポットライト"
  - 「センサースポットライト」「センサー付きスポットライト」→ fixture_type: "スポットライト(センサー付き)"
  - 「アッパーライト」→ fixture_type: "アッパーライト"
  - 「センサーライト」→ fixture_type: "センサーライト"
  - 「埋込スクエアライト」→ fixture_type: "スクエアライト(埋込)"

  ### ワット数と灯数の読み取り
  - 「20w」「20W」「20形」→ FL20, power_w: 20
  - 「40w」「40W」「40形」→ FL40, power_w: 40
  - 「10w」「10W」「10形」→ FL10, power_w: 10
  - 「30型サークル」「丸型30形」→ FCL30, power_w: 30
  - 「40w✖️2」「40w×2」「2灯用」→ bulb_count: 2
  - 「菅球」「管球」→ 電球型蛍光灯（通常EFD系）

  ## 電球種別の推定（bulb_type）
  - 「蛍光灯20W」「20形蛍光灯」「20w」→ bulb_type: "FL20", power_w: 20
  - 「蛍光灯40W」「40形蛍光灯」「40w」→ bulb_type: "FL40", power_w: 40
  - 「丸型蛍光灯30形」「30型サークル」→ bulb_type: "FCL30", power_w: 30
  - 「コンパクト蛍光灯13W」→ bulb_type: "FDL13", power_w: 13
  - 「白熱灯60W」「白熱60W」→ bulb_type: "白熱60W", power_w: 60
  - ダウンライトでワット数不明 → bulb_type: "" (空文字)
  - ブラケットでワット数不明 → bulb_type: "" (空文字)
  - 不明な場合は空文字にし、power_w は文脈から推定

  ## 数量のルール
  - 数量が明記されていない場合は 1 とする
  - 「3灯」「3台」「3本」「×3」「x3」→ 3
  - **数量だけの行は直前の器具に属する（例: 「20w逆富士 → 2台」= 20w逆富士が2台）**
  - 「各階に3灯」「各階3台」→ 推定される各階に3ずつ

  ## 除外判定（LED交換不要の器具）

  以下のいずれかに該当する器具は is_excluded: true にして excluded_fixtures に入れる:
  - 「LED更新済み」「LED済み」「LED交換済」→ exclusion_reason: "LED更新済み"
  - 「(LED)」「（LED）」が器具名に含まれる → exclusion_reason: "LED済み"
  - 「対象外」「除外」→ exclusion_reason: "対象外"
  - 「未更新」→ LED未更新 = 交換対象（is_excluded: false）※注意
  - 「2台LED更新済み」のように数量+除外が一体の場合 → 全数量を除外

  **重要**: 「誘導灯 2台LED更新済み」→ 誘導灯2台はLED済みなので除外。
  「誘導灯」単独で出現した場合は、LED済みの記載がなければ交換対象とする。

  ## 点灯時間の推定（daily_hours）

  場所に基づいて点灯時間を推定してください:

  | 場所 | daily_hours | 理由 |
  |------|-------------|------|
  | 外部通路、外部廊下、駐車場、駐輪場 | 12 | 夜間のみ点灯 |
  | 共用廊下、廊下、通路、内廊下 | 12 | 夜間〜早朝 |
  | 軒下、玄関前、エントランス | 12 | 夜間〜早朝 |
  | 階段、階段室 | 24 | 非常灯兼用が多く常時点灯 |
  | 非常灯、誘導灯 | 24 | 法定常時点灯 |
  | 車庫、ガレージ | 12 | 夜間のみ |
  | 庭園、外周 | 8 | 夕方〜夜間 |
  | 屋上、塔屋 | 8 | 夜間短時間 |
  | ロビー | 8 | 日中〜夜間 |
  | テナント | 8 | 営業時間 |
  | その他、不明 | 12 | デフォルト |

  **テキストに点灯時間が明記されている場合はそちらを優先。**
  **非常灯内蔵の逆富士も daily_hours: 24 とする（常時点灯義務）。**

  ## デフォルト値
  - 色温度が不明 → color_temp: ""
  - 器具サイズが不明 → fixture_size: ""
  - bulb_count が不明 → bulb_count: 1

  ## confidence の判定
  - テキストに器具種別・数量・場所が全て明記 → "high"
  - 器具種別を省略から推定した、または場所が曖昧 → "medium"
  - 情報が非常に少なく推測要素が多い → "low"

  ## row_label の割り当て
  - A, B, C, ... の順で割り当て（Z超えたらAA, AB...）
  - excluded_fixtures の row_label は fixtures の続きから

  ## 具体例

  ### 入力例1:
  ```
  軒下
  ダウンライト150φ 2台
  エントランス
  150φ 2台

  1階
  ダウンライト150φ
  2台

  2階
  20w非常内蔵逆富士 1台
  ```

  ### 出力例1:
  - A: location="軒下", fixture_type="ダウンライト", fixture_size="Φ150", floor_quantities={"1F": 2}, daily_hours=12
  - B: location="エントランス", fixture_type="ダウンライト"（省略→継承）, fixture_size="Φ150", floor_quantities={"1F": 2}, daily_hours=12
  - C: location="廊下", fixture_type="ダウンライト", fixture_size="Φ150", floor_quantities={"1F": 2}, daily_hours=12
  - D: location="廊下", fixture_type="逆富士", bulb_type="FL20", floor_quantities={"2F": 1}, daily_hours=24, notes="非常灯内蔵"

  ### 入力例2:
  ```
  4階
  20w非常内蔵逆富士
  3台
  誘導灯
  2台LED更新済み

  3階
  20w非常内蔵逆富士
  3台
  誘導灯
  2台LED更新済み
  ```

  ### 出力例2:
  - A: location="廊下", fixture_type="逆富士", bulb_type="FL20", floor_quantities={"3F": 3, "4F": 3}, daily_hours=24, notes="非常灯内蔵"（同一器具を集約）
  - excluded X: location="廊下", fixture_type="誘導灯", floor_quantities={"3F": 2, "4F": 2}, exclusion_reason="LED更新済み"

  ## 入力データ

  物件名: {property_name}
  住所: {address}

  --- 履歴テキスト ---
  {memo_text}

  ## 添付写真について

  添付写真がある場合（photo_1, photo_2, ... として番号付き）:
  - 各写真に写っている器具を特定し、対応するfixtureの photo_refs に写真番号を入れる
  - 例: photo_2 に逆富士が写っていれば、その逆富士fixtureの photo_refs: [2]
  - 1つの写真に複数器具が写っている場合、それぞれのfixtureに同じ番号を入れてよい
  - 写真から器具種別やサイズを判断できる場合、テキストの情報を補完・修正する
  - テキストにない器具が写真のみに写っている場合、fixtureに追加する（confidence: "low"）
  - 写真がない場合は photo_refs を全て空配列 [] にする

