name: Sync Feedback & Update Rules

on:
  schedule:
    # 毎日 UTC 0:00 = JST 09:00 に実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 手動実行も可能（GitHub Actions の UI から）

permissions:
  contents: write   # git push のため必要

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # push するために fetch-depth: 0 で全履歴取得
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl pyyaml

      - name: Run feedback sync
        run: python sync_feedback.py
        env:
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d feedback/ ]; then
            git add feedback/
            git diff --cached --quiet || git commit -m "フィードバック同期: ルール自動更新 ($(date +%Y-%m-%d))"
            git push
          else
            echo "feedback/ ディレクトリなし — スキップ"
          fi
